<!DOCTYPE html>
<html lang="ru">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="./styles.css" rel="stylesheet"/>
    </head>
    <body>
        <div class="stars" id="stars"></div>
        <div class="container">
            <div>
                <h1 class="header_text">Сладкий, ты меня любишь?</h1>
            </div>
            <div class="gif_container">
                <img src="homyak.jpg">
            </div>
            <div class="buttons">
                <button class="btn" id="yesButton" onclick="nextPage()">Да</button>
                <button class="btn" id="noButton" onmouseover="moveButton()" ontouchstart="moveButton()" onclick="moveButton()">Нет</button>
                <script>
                    function nextPage() {
                        window.location.href = "yes.html";
                    }

                    function moveButton() {
    const button = document.getElementById('noButton');
    const maxX = window.innerWidth - button.offsetWidth - 10;
    const maxY = window.innerHeight - button.offsetHeight - 10;
    const x = Math.max(10, Math.random() * maxX);
    const y = Math.max(10, Math.random() * maxY);
    button.style.position = "fixed";
    button.style.left = `${x}px`;
    button.style.top = `${y}px`;
}
               </script>
            </div>
        </div>
        <script>
            const starsContainer = document.getElementById('stars');
            const starCount = 60;
            for (let i = 0; i < starCount; i++) {
                const isSparkle = i % 6 === 0;
                const star = document.createElement('div');
                star.className = isSparkle ? 'star-sparkle' : 'star';
                if (!isSparkle) {
                    const size = Math.random() * 2 + 1;
                    star.style.width = `${size}px`;
                    star.style.height = `${size}px`;
                }
                star.style.top = `${Math.random() * 100}%`;
                star.style.left = `${Math.random() * 100}%`;
                star.style.animationDelay = `${Math.random() * 3}s`;
                starsContainer.appendChild(star);
            }
        </script>
    </body>
</html>
