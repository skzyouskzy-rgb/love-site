<!DOCTYPE html>
<html lang="ru">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="./styles.css" rel="stylesheet"/>
    </head>
    <body>
        <div class="stars"></div>
        <div class="container">
            <div>
                <h1 class="header_text">Сладкий, ты меня любишь?</h1>
            </div>
            <div class="gif_container">
                <img src="homyak.jpg">
            </div>
            <div class="buttons">
                <button class="btn" id="yesButton" onclick="nextPage()">Да</button>
                <button class="btn" id="noButton" onmouseover="moveButton()" ontouchstart="moveButton()" onclick="moveButton()">Нет</button>
                <script>
                    function nextPage() {
                        window.location.href = "yes.html";
                    }

                    function moveButton() {
    const button = document.getElementById('noButton');

    const x = Math.random() * (window.innerWidth - button.offsetWidth);
    const y = Math.random() * (window.innerHeight - button.offsetHeight);

    button.style.position = "fixed";
    button.style.left = `${x}px`;
    button.style.top = `${y}px`;
}
                </script>
            </div>
        </div>
    </body>
</html>
