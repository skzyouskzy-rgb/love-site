<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="./yes_style.css" rel="stylesheet"/>
</head>
<body>
    <div class="container">
        <div>
            <h1 class="header_text">Ееееееее! Я тоже тебя люблю ❤️!</h1>
        </div>
        <div class="gif_container">
            <img src="my.jpg" alt="romantic image">
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const img = document.querySelector('img');

            function createConfetti() {
                const rect = img.getBoundingClientRect();
                const colors = ['#ffb6c1', '#ffd166', '#ffffff', '#ff7eb6', '#a78bfa'];
                const icons = ['❤', '★', '✦', '•'];
                const count = 22;

                for (let i = 0; i < count; i++) {
                    const piece = document.createElement('div');
                    piece.className = 'confetti';
                    piece.textContent = icons[i % icons.length];
                    piece.style.left = `${rect.left + rect.width / 2}px`;
                    piece.style.top = `${rect.top + rect.height / 2}px`;
                    piece.style.color = colors[i % colors.length];
                    piece.style.fontSize = `${12 + Math.random() * 12}px`;

                    const angle = (Math.PI * 2 * i) / count;
                    const distance = 70 + Math.random() * 90;
                    piece.style.setProperty('--dx', `${Math.cos(angle) * distance}px`);
                    piece.style.setProperty('--dy', `${Math.sin(angle) * distance}px`);

                    document.body.appendChild(piece);
                    setTimeout(() => piece.remove(), 2000);
                }
            }

            createConfetti();
        });
    </script>
</body>
</html>
